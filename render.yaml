services:
  - type: web
    name: sportsdb-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false

  - type: worker
    name: sportsdb-bot
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python -m app.workers.telegram_bot
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false

  - type: worker
    name: sportsdb-ingestion
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python -m app.workers.ingestion_worker
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
